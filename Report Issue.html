<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Error Feedback - GB Career Pilot</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-background": "#191c1d",
              error: "#ba1a1a",
              "surface-bright": "#f8f9fa",
              "on-primary": "#ffffff",
              "on-error": "#ffffff",
              "tertiary-container": "#3d1500",
              "surface-container-lowest": "#ffffff",
              "surface-tint": "#465f88",
              "on-secondary": "#ffffff",
              primary: "#000a1e",
              "on-tertiary-fixed-variant": "#6c391d",
              "surface-variant": "#e1e3e4",
              surface: "#f8f9fa",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#aec7f6",
              "on-primary-fixed-variant": "#2d476f",
              "on-primary-container": "#708ab5",
              "error-container": "#ffdad6",
              "on-secondary-fixed": "#00210c",
              "on-surface-variant": "#44474e",
              "inverse-primary": "#aec7f6",
              tertiary: "#180500",
              "tertiary-fixed-dim": "#ffb691",
              "on-tertiary-container": "#b97958",
              "surface-container": "#edeeef",
              "inverse-on-surface": "#f0f1f2",
              "secondary-fixed": "#83fba5",
              "primary-fixed": "#d6e3ff",
              "on-secondary-fixed-variant": "#005227",
              "surface-dim": "#d9dadb",
              "on-error-container": "#93000a",
              "on-primary-fixed": "#001b3d",
              "secondary-container": "#83fba5",
              "primary-container": "#002147",
              "inverse-surface": "#2e3132",
              "outline-variant": "#c4c6cf",
              "surface-container-high": "#e7e8e9",
              background: "#f8f9fa",
              secondary: "#006d36",
              "on-surface": "#191c1d",
              "on-secondary-container": "#00743a",
              "surface-container-highest": "#e1e3e4",
              "tertiary-fixed": "#ffdbcb",
              "surface-container-low": "#f3f4f5",
              outline: "#74777f",
              "secondary-fixed-dim": "#66dd8b",
              "on-tertiary-fixed": "#341100",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {},
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .font-headline {
        font-family: "Manrope", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .material-symbols-outlined.fill {
        font-variation-settings: "FILL" 1;
      }
    </style>
    <style>
      body {
        min-height: max(884px, 100dvh);
      }
    </style>
  </head>
  <body
    class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-6 antialiased"
  >
    <main
      class="w-full max-w-md w-full bg-surface-container-lowest rounded-[24px] shadow-[0_24px_48px_-12px_rgba(0,10,30,0.1)] overflow-hidden flex flex-col border border-outline-variant/15"
    >
      <!-- Header Section with Error Graphic -->
      <div
        class="relative bg-gradient-to-br from-error-container/50 to-surface pt-12 pb-8 px-8 flex flex-col items-center text-center"
      >
        <div
          class="w-20 h-20 rounded-full bg-error-container flex items-center justify-center mb-6 shadow-[0_8px_24px_-8px_rgba(186,26,26,0.3)]"
        >
          <span class="material-symbols-outlined fill text-error text-4xl"
            >warning</span
          >
        </div>
        <h1
          class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-2"
        >
          Oops, a system hiccup
        </h1>
        <p class="font-body text-sm text-on-surface-variant font-medium">
          We've run into an unexpected error. Help us navigate back on course by
          sharing what happened.
        </p>
      </div>
      <!-- Feedback Form -->
      <div class="p-8 flex-1 bg-surface-container-lowest">
        <form class="space-y-6">
          <!-- Issue Type Selection (Bento style) -->
          <div>
            <label
              class="block font-headline font-bold text-sm text-primary mb-3"
              >What kind of issue?</label
            >
            <div class="grid grid-cols-2 gap-3">
              <label class="cursor-pointer relative">
                <input
                  checked=""
                  class="peer sr-only"
                  name="issue_type"
                  type="radio"
                  value="ui"
                />
                <div
                  class="p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low peer-checked:bg-secondary-container/20 peer-checked:border-secondary peer-checked:text-secondary-fixed text-on-surface-variant transition-all flex flex-col items-center justify-center text-center gap-2 hover:bg-surface-container-highest"
                >
                  <span class="material-symbols-outlined text-2xl">web</span>
                  <span class="font-label text-xs font-semibold"
                    >Visual / UI</span
                  >
                </div>
              </label>
              <label class="cursor-pointer relative">
                <input
                  class="peer sr-only"
                  name="issue_type"
                  type="radio"
                  value="data"
                />
                <div
                  class="p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low peer-checked:bg-secondary-container/20 peer-checked:border-secondary peer-checked:text-secondary-fixed text-on-surface-variant transition-all flex flex-col items-center justify-center text-center gap-2 hover:bg-surface-container-highest"
                >
                  <span class="material-symbols-outlined text-2xl"
                    >database</span
                  >
                  <span class="font-label text-xs font-semibold"
                    >Missing Data</span
                  >
                </div>
              </label>
              <label class="cursor-pointer relative">
                <input
                  class="peer sr-only"
                  name="issue_type"
                  type="radio"
                  value="ai"
                />
                <div
                  class="p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low peer-checked:bg-secondary-container/20 peer-checked:border-secondary peer-checked:text-secondary-fixed text-on-surface-variant transition-all flex flex-col items-center justify-center text-center gap-2 hover:bg-surface-container-highest"
                >
                  <span class="material-symbols-outlined text-2xl"
                    >smart_toy</span
                  >
                  <span class="font-label text-xs font-semibold"
                    >AI Response</span
                  >
                </div>
              </label>
              <label class="cursor-pointer relative">
                <input
                  class="peer sr-only"
                  name="issue_type"
                  type="radio"
                  value="other"
                />
                <div
                  class="p-3 rounded-xl border border-outline-variant/30 bg-surface-container-low peer-checked:bg-secondary-container/20 peer-checked:border-secondary peer-checked:text-secondary-fixed text-on-surface-variant transition-all flex flex-col items-center justify-center text-center gap-2 hover:bg-surface-container-highest"
                >
                  <span class="material-symbols-outlined text-2xl"
                    >more_horiz</span
                  >
                  <span class="font-label text-xs font-semibold">Other</span>
                </div>
              </label>
            </div>
          </div>
          <!-- Details Text Area -->
          <div>
            <label
              class="block font-headline font-bold text-sm text-primary mb-2"
              for="details"
              >Can you tell us more?</label
            >
            <textarea
              class="w-full bg-surface-container-low text-on-surface font-body text-sm rounded-xl border-none focus:ring-0 focus:bg-surface-container-lowest focus:border-b-2 focus:border-secondary transition-all resize-none p-4 placeholder:text-on-surface-variant/50"
              id="details"
              name="details"
              placeholder="What were you trying to do?"
              rows="3"
            ></textarea>
          </div>
          <!-- Auto-captured Diagnostic Info -->
          <div
            class="bg-surface-container-low p-4 rounded-xl space-y-2 border border-outline-variant/10"
          >
            <div class="flex items-center gap-2 mb-1">
              <span
                class="material-symbols-outlined text-on-surface-variant text-sm"
                >memory</span
              >
              <span
                class="font-headline text-xs font-bold text-on-surface-variant uppercase tracking-wider"
                >Diagnostic Data (Auto-Captured)</span
              >
            </div>
            <div class="flex justify-between text-xs font-body text-outline">
              <span>Timestamp:</span>
              <span class="font-mono text-on-surface-variant"
                >2023-10-27T14:32:01Z</span
              >
            </div>
            <div class="flex justify-between text-xs font-body text-outline">
              <span>Route:</span>
              <span class="font-mono text-on-surface-variant"
                >/app/ai-roadmap/generate</span
              >
            </div>
            <div class="flex justify-between text-xs font-body text-outline">
              <span>Error Code:</span>
              <span class="font-mono text-error font-medium"
                >ERR_TIMEOUT_504</span
              >
            </div>
          </div>
        </form>
      </div>
      <!-- Footer Actions -->
      <div class="p-8 pt-0 bg-surface-container-lowest space-y-3">
        <button
          class="w-full py-4 px-6 rounded-xl bg-gradient-to-br from-primary-container to-primary text-on-primary font-headline font-bold text-base hover:opacity-90 transition-opacity flex items-center justify-center gap-2 shadow-[0_8px_16px_-4px_rgba(0,10,30,0.2)]"
          type="button"
        >
          <span>Submit Feedback</span>
          <span class="material-symbols-outlined text-lg">send</span>
        </button>
        <button
          class="w-full py-4 px-6 rounded-xl bg-transparent text-secondary font-headline font-bold text-sm border border-outline-variant/15 hover:bg-secondary-container/5 transition-colors flex items-center justify-center gap-2"
          type="button"
        >
          <span class="material-symbols-outlined text-lg">arrow_back</span>
          <span>Go Back to Dashboard</span>
        </button>
      </div>
    </main>
  </body>
</html>
